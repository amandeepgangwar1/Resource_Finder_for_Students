<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">

<div class="card auth-card">

<p class="eyebrow">Account</p>
<h2>Forgot Password</h2>

<form id="forgotPasswordForm">
  <input type="email" id="email" placeholder="Email" required><br><br>
  <button type="submit">Create Reset Link</button>
</form>

<p id="message"></p>
<div id="resetLinkPanel" hidden>
  <p>Use this reset link within 30 minutes.</p>
  <p><a id="resetLink" href="reset-password.html">Reset your password</a></p>
</div>

<p><a href="login.html">Back to login</a></p>

</div>

<footer class="app-footer">
  <p>2026 Student Resource Finder Platform by Amandeep Gangwar</p>
</footer>

<script src="config.js"></script>
<script>
const API = window.resourceFinderApiBase();

document.getElementById("forgotPasswordForm").addEventListener("submit", async (event) => {
  event.preventDefault();

  const message = document.getElementById("message");
  const resetLinkPanel = document.getElementById("resetLinkPanel");
  const resetLink = document.getElementById("resetLink");
  const submitButton = event.currentTarget.querySelector("button[type='submit']");

  message.textContent = "Creating reset link...";
  resetLinkPanel.hidden = true;
  submitButton.disabled = true;

  try {
    const response = await fetch(`${API}/auth/forgot-password`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: document.getElementById("email").value })
    });
    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.message || "Unable to create reset link");
    }

    message.textContent = data.message;
    if (data.resetUrl) {
      resetLink.href = new URL(data.resetUrl, window.location.origin).href;
      resetLinkPanel.hidden = false;
    }
  } catch (error) {
    message.textContent = error.message;
  } finally {
    submitButton.disabled = false;
  }
});
</script>

</body>
</html>

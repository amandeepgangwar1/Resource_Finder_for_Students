services:
  - type: web
    name: student-resource-finder-api
    env: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: HF_API_KEY
        sync: false
      - key: MAX_UPLOAD_MB
        value: 25

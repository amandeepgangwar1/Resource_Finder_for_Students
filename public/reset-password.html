<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">

<div class="card auth-card">

<p class="eyebrow">Account</p>
<h2>Reset Password</h2>

<form id="resetPasswordForm">
  <input type="email" id="email" placeholder="Email" required><br><br>
  <input type="text" id="token" placeholder="Reset token" required><br><br>
  <input type="password" id="password" placeholder="New password" required minlength="6"><br><br>
  <button type="submit">Update Password</button>
</form>

<p id="message"></p>
<p><a href="login.html">Back to login</a></p>

</div>

<footer class="app-footer">
  <p>2026 Student Resource Finder Platform by Amandeep Gangwar</p>
</footer>

<script src="config.js"></script>
<script>
const API = window.resourceFinderApiBase();
const params = new URLSearchParams(window.location.search);

document.getElementById("email").value = params.get("email") || "";
document.getElementById("token").value = params.get("token") || "";

document.getElementById("resetPasswordForm").addEventListener("submit", async (event) => {
  event.preventDefault();

  const message = document.getElementById("message");
  const submitButton = event.currentTarget.querySelector("button[type='submit']");

  message.textContent = "Updating password...";
  submitButton.disabled = true;

  try {
    const response = await fetch(`${API}/auth/reset-password`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: document.getElementById("email").value,
        token: document.getElementById("token").value,
        password: document.getElementById("password").value
      })
    });
    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.message || "Unable to reset password");
    }

    message.innerHTML = `${data.message}. <a href="login.html">Login now</a>.`;
    event.currentTarget.reset();
  } catch (error) {
    message.textContent = error.message;
  } finally {
    submitButton.disabled = false;
  }
});
</script>

</body>
</html>
